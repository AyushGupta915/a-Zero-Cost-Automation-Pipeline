services:
  n8n:
    image: n8nio/n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=clara2025
      - N8N_HOST=localhost
      - N8N_PROTOCOL=http
      - N8N_NODES_EXCLUDE=                     # ← This line enables Execute Command node
    volumes:
      - ./n8n_data:/home/node/.n8n
      - .:/home/node/.n8n/project              # ← Mounts your whole repo so n8n can see scripts/